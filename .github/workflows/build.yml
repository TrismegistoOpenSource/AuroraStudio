name: Build AuroraStudio

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # serve alla release job per pubblicare gli asset

env:
  NODE_VERSION: "22"

jobs:
  # Le due app macOS si compilano su runner NATIVI (arm64 e Intel), non con un
  # cross-build da un solo host: sharp/libvips sono binari nativi per-arch e
  # farli convivere a mano è la parte più fragile della build (vedi BUILD.md).
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
            script: build:mac-arm
            app: AuroraStudio-AppleSilicon
            expect: arm64
            appid: com.aurorastudio.app.arm64
            ffmpeg: darwin-arm64
          - runner: macos-15-intel
            arch: x64
            script: build:mac-intel
            app: AuroraStudio-Intel
            expect: x86_64
            appid: com.aurorastudio.app.intel
            ffmpeg: darwin-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Verifica che ffmpeg sia stato scaricato
        # resources/ffmpeg/ è in .gitignore: non arriva dal checkout, lo scarica
        # scripts/prepare-ffmpeg.js dal postinstall. Quello script, di proposito,
        # NON fa fallire l'install se è offline — quindi senza questo controllo
        # un job verde spedirebbe un'app con la pulizia metadati video rotta.
        run: |
          set -e
          f="resources/ffmpeg/${{ matrix.ffmpeg }}/ffmpeg"
          test -s "$f" || { echo "FALLITO: $f assente: prepare-ffmpeg.js non ha scaricato il binario"; find resources/ffmpeg -type f 2>/dev/null; exit 1; }
          chmod +x "$f"
          echo "OK: $("$f" -version 2>&1 | head -1)"

      # directories.output è ../build (schema del workspace: artefatti fuori dal
      # sorgente), ma upload-artifact rifiuta i percorsi fuori dalla workspace
      # del runner: qui si scrive in dist/.
      - name: Build ${{ matrix.arch }}
        shell: bash
        run: |
          set -o pipefail
          npm run ${{ matrix.script }} -- -c.directories.output=dist --publish never 2>&1 | tee /tmp/build.log || {
            bash .github/annota-errore.sh /tmp/build.log "Build ${{ matrix.arch }} fallita"
            exit 1
          }

      - name: Verifica il dmg come lo riceve l'utente
        # Non basta l'exit code di electron-builder: si monta il dmg e si guarda
        # l'app che ci sta dentro. Gli asset macOS di RsyncGUI v2.1.0 erano
        # verdi in CI e inservibili una volta scaricati.
        run: |
          set -e
          dmg=$(ls dist/*.dmg)
          echo "dmg prodotto: $dmg"
          hdiutil attach -nobrowse -readonly "$dmg" -mountpoint /tmp/m
          app="/tmp/m/${{ matrix.app }}.app"
          test -d "$app" || { echo "FALLITO: ${{ matrix.app }}.app non è nel dmg"; ls -la /tmp/m; exit 1; }

          got=$(lipo -archs "$app/Contents/MacOS/${{ matrix.app }}")
          test "$got" = "${{ matrix.expect }}" || { echo "FALLITO: architettura $got, attesa ${{ matrix.expect }}"; exit 1; }

          # Con lo stesso appId macOS tratta le due app come la stessa e ne
          # risolve una sola: è così che la arm64 veniva rilevata come Intel.
          id=$(/usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$app/Contents/Info.plist")
          test "$id" = "${{ matrix.appid }}" || { echo "FALLITO: bundle id '$id', atteso '${{ matrix.appid }}'"; exit 1; }

          # ffmpeg impacchettato (extraResources) e sharp della sola arch giusta
          # (afterPack.js rimuove l'altra): entrambi servono a runtime.
          test -s "$app/Contents/Resources/ffmpeg/ffmpeg" || { echo "FALLITO: ffmpeg non impacchettato"; exit 1; }
          img="$app/Contents/Resources/app.asar.unpacked/node_modules/@img"
          test -d "$img" || { echo "FALLITO: binari sharp assenti dal pacchetto"; exit 1; }
          other=$([ "${{ matrix.arch }}" = "arm64" ] && echo x64 || echo arm64)
          if ls "$img" | grep -q "darwin-$other"; then echo "FALLITO: nel pacchetto ${{ matrix.arch }} c'è ancora sharp per $other"; ls "$img"; exit 1; fi

          # Le licenze devono ACCOMPAGNARE l'app. electron-builder salta in
          # silenzio gli extraResources con sorgente mancante: senza questo
          # controllo un'app senza licenze Electron/Chromium uscirebbe verde.
          lic="$app/Contents/Resources/licenses"
          for f in LICENSE.txt THIRD-PARTY-LICENSES.md LICENSE.electron.txt LICENSES.chromium.html; do
            test -s "$lic/$f" || { echo "FALLITO: $f assente dalle licenze impacchettate"; ls "$lic" 2>/dev/null; exit 1; }
          done

          echo "OK: ${{ matrix.app }}.app — $got, id $id, ffmpeg, sharp e licenze a posto"
          hdiutil detach /tmp/m

      - uses: actions/upload-artifact@v4
        with:
          name: AuroraStudio-macOS-${{ matrix.arch }}
          path: dist/*.dmg

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Verifica che ffmpeg sia stato scaricato
        shell: bash # git bash è presente sui runner Windows: stesso comando ovunque
        run: |
          set -e
          test -s "resources/ffmpeg/win32-x64/ffmpeg.exe" || { echo "FALLITO: ffmpeg.exe assente: prepare-ffmpeg.js non l'ha scaricato"; exit 1; }
          echo "OK: ffmpeg.exe presente"
      - name: Build Windows
        shell: bash
        run: |
          set -o pipefail
          npm run build:win -- -c.directories.output=dist --publish never 2>&1 | tee /tmp/build.log || {
            bash .github/annota-errore.sh /tmp/build.log "Build Windows fallita"
            exit 1
          }
      - name: Verifica l'installer
        shell: bash
        run: |
          set -e
          exe=$(ls dist/*.exe)
          test -s "$exe" || { echo "FALLITO: nessun installer prodotto"; exit 1; }
          echo "OK: $exe"
      - uses: actions/upload-artifact@v4
        with:
          name: AuroraStudio-Windows
          path: dist/*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Verifica che ffmpeg sia stato scaricato
        run: |
          set -e
          test -s "resources/ffmpeg/linux-x64/ffmpeg" || { echo "FALLITO: ffmpeg assente: prepare-ffmpeg.js non l'ha scaricato"; exit 1; }
          echo "OK: ffmpeg presente"
      - name: Build Linux
        run: |
          set -o pipefail
          npm run build:linux -- -c.directories.output=dist --publish never 2>&1 | tee /tmp/build.log || {
            bash .github/annota-errore.sh /tmp/build.log "Build Linux fallita"
            exit 1
          }
      - name: Verifica l'AppImage
        run: |
          set -e
          ls dist/*.AppImage >/dev/null || { echo "FALLITO: nessun AppImage"; exit 1; }
          for f in dist/*.AppImage; do chmod +x "$f"; file "$f" | grep -q ELF || { echo "FALLITO: $f non è un eseguibile"; exit 1; }; done
          echo "OK: $(ls dist/*.AppImage)"
      - uses: actions/upload-artifact@v4
        with:
          name: AuroraStudio-Linux
          path: dist/*.AppImage

  # Pubblica una Release vera (pagina permanente, nessun login richiesto) solo
  # quando il push è un tag di versione (es. v1.0.0) — non ad ogni commit.
  release:
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Elenca cosa verrà pubblicato
        run: find artifacts -type f
      - name: Pubblica la Release
        # Ritenta: l'API REST di GitHub ha disservizi periodici (il 17/07/2026
        # il 35% delle richieste falliva con un 500) e senza ritentare una
        # versione compilata e verificata resta non pubblicata, costringendo a
        # rifare il tag a mano. gh è preinstallato sui runner e usa GITHUB_TOKEN:
        # niente dipendenze di terze parti nel passo che pubblica.
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # forma portabile: mapfile non c'è in bash 3.2 (macOS), e uno step
          # che non si può provare in locale è uno step che si scopre rotto in CI.
          files=()
          while IFS= read -r f; do files+=("$f"); done < <(find artifacts -type f)
          test "${#files[@]}" -gt 0 || { echo "::error::nessun artefatto da pubblicare"; exit 1; }
          for i in $(seq 1 6); do
            if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
              gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber && exit 0
            else
              gh release create "$GITHUB_REF_NAME" "${files[@]}" --generate-notes && exit 0
            fi
            echo "tentativo $i fallito (API GitHub instabile?), riprovo tra 30s"
            sleep 30
          done
          echo "::error::Pubblicazione fallita dopo 6 tentativi"
          exit 1
